{% extends "tasks/layout.html" %}
{% block body %}
    <ul>
        {% for task in tasks %}
            <li><h2> {{ task }} </h2></li>
        {% empty %}
            <li><h2>No tasks</h2></li>
        {% endfor %}
    </ul>
    <h2><a href="{% url 'tasks:add' %}">New Task</a></h2>
{% endblock %}
